<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{app_title}</title>
    <link rel="manifest" href="{base_path}/assets/manifest.json" />
    <link rel="icon" type="image/png" href="{base_path}/assets/favicon.ico" />
    <meta name="theme-color" content="#0f94c1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SLEC" />
    <link rel="apple-touch-icon" href="{base_path}/assets/icon-192.png" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("{base_path}/assets/sw.js")
            .then(function (reg) {
              console.log("SW registered:", reg.scope);
            })
            .catch(function (err) {
              console.error("SW registration failed:", err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="main"></div>
  </body>
</html>
